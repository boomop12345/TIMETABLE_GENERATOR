<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Dynamic Timetable Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    :root {
      --bg-base: #080c14;
      --bg-card: rgba(255, 255, 255, 0.045);
      --bg-input: rgba(255, 255, 255, 0.055);
      --border-card: rgba(255, 255, 255, 0.10);
      --border-input: rgba(255, 255, 255, 0.09);
      --text-primary: rgba(255, 255, 255, 0.95);
      --text-secondary: rgba(255, 255, 255, 0.45);
      --text-tertiary: rgba(255, 255, 255, 0.25);
      --accent: #6366f1;
      --accent-bright: #818cf8;
      --accent-dim: rgba(99, 102, 241, 0.18);
      --radius-card: 20px;
      --radius-btn: 11px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      background-color: var(--bg-base);
      background-image:
        radial-gradient(ellipse 80% 60% at 10% 0%, rgba(49,46,129,0.55) 0%, transparent 55%),
        radial-gradient(ellipse 70% 55% at 92% 8%, rgba(15,23,60,0.70) 0%, transparent 50%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(67,56,202,0.30) 0%, transparent 50%);
      background-attachment: fixed;
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      opacity: 0.5;
    }

    .container {
      position: relative; z-index: 1;
    }

    /* ── MOBILE CONTAINER PADDING ── */
    .container.mx-auto {
      padding: 1rem;
    }
    @media (min-width: 768px) {
      .container.mx-auto { padding: 3rem; }
    }

    .tools { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .circle { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .red { background-color: #ff5f56; box-shadow: 0 0 5px rgba(255, 95, 86, 0.5); }
    .yellow { background-color: #ffbd2e; box-shadow: 0 0 5px rgba(255, 189, 46, 0.5); }
    .green { background-color: #27c93f; box-shadow: 0 0 5px rgba(39, 201, 63, 0.5); }

    .card, .glass {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-card);
      padding: 1.25rem;
      backdrop-filter: blur(32px) saturate(160%);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      box-shadow: 0 0 0 0.5px rgba(255,255,255,0.05) inset, 0 1px 0 rgba(255,255,255,0.07) inset,
        0 20px 60px rgba(0,0,0,0.55);
      transition: var(--transition);
      position: relative;
      /* CRITICAL: prevent internal content from overflowing */
      min-width: 0;
      overflow: hidden;
    }
    @media (min-width: 768px) {
      .card, .glass { padding: 2rem; }
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.06);
    }

    .stats-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent);
      border: 1px solid rgba(99, 102, 241, 0.2);
      backdrop-filter: blur(16px);
    }

    .dynamic-list-item {
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-card);
      padding: 0.75rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--text-primary);
      transition: var(--transition);
      /* FIX: prevent text overflow in list items */
      min-width: 0;
      gap: 0.5rem;
    }
    
    .dynamic-list-item:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.15);
    }

    /* FIX: text inside list items must truncate or wrap */
    .dynamic-list-item span,
    .dynamic-list-item strong,
    .dynamic-list-item div {
      min-width: 0;
      word-break: break-word;
      overflow-wrap: break-word;
    }

    .subject-grade-selector, #faculty-subject-assignment > div {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-card);
      border-radius: 14px;
      padding: 1rem;
      max-height: 250px;
      overflow-y: auto;
    }

    /* ── INPUTS ── */
    input[type="number"], input[type="text"] {
      background: var(--bg-input) !important;
      border: 1px solid var(--border-input) !important;
      border-radius: 8px;
      color: #fff !important;
      padding: 0.5rem 0.8rem;
      outline: none;
      transition: all 0.2s;
      /* FIX: never overflow their container */
      max-width: 100%;
      width: 100%;
    }

    input:focus {
      border-color: var(--accent-bright) !important;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2) !important;
    }

    input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ── BUTTONS ── */
    .btn-primary, .view-btn.active {
      background: var(--accent);
      color: #fff !important;
      font-weight: 600;
      border-radius: var(--radius-btn);
      padding: 0.7rem 1.2rem;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 0 20px rgba(99,102,241,0.30), inset 0 1px 0 rgba(255,255,255,0.12);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
      font-size: 0.875rem;
    }
    @media (min-width: 640px) {
      .btn-primary, .view-btn.active {
        padding: 0.8rem 2rem;
        font-size: 1rem;
      }
    }

    .btn-primary:hover, .view-btn.active:hover {
      background: #7477ff;
      transform: translateY(-2px);
      box-shadow: 0 0 32px rgba(99,102,241,0.50);
    }

    .btn-secondary, .view-btn {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-secondary) !important;
      border: 1px solid var(--border-card);
      font-weight: 600;
      border-radius: var(--radius-btn);
      padding: 0.7rem 1.2rem;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      font-size: 0.875rem;
    }
    @media (min-width: 640px) {
      .btn-secondary, .view-btn { padding: 0.8rem 2rem; font-size: 1rem; }
    }

    .btn-secondary:hover, .view-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff !important;
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 0.4rem 0.6rem;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      flex-shrink: 0;
      font-size: 0.75rem;
    }

    .btn-danger:hover { background: #ef4444; color: #fff; }

    /* ── TIMETABLE WRAPPER: HORIZONTAL SCROLL ── */
    .timetable-scroll-wrapper {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 12px;
    }

    /* Subtle scroll hint on mobile */
    .timetable-scroll-wrapper::after {
      content: "";
      display: block;
    }

    .timetable table {
      width: 100%;
      min-width: 600px; /* forces scroll on small screens */
      border-collapse: separate;
      border-spacing: 4px;
      table-layout: fixed;
    }
    @media (min-width: 768px) {
      .timetable table { border-spacing: 8px; }
    }

    .timetable th {
      background: rgba(255, 255, 255, 0.02);
      padding: 8px 4px;
      border-radius: 8px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      white-space: nowrap;
    }
    @media (min-width: 768px) {
      .timetable th { padding: 15px; font-size: 0.75rem; border-radius: 12px; }
    }

    .timetable td {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-card);
      border-radius: 10px;
      padding: 0.5rem 0.25rem;
      text-align: center;
      transition: var(--transition);
      color: var(--text-secondary);
      font-size: 0.75rem;
      vertical-align: middle;
    }
    @media (min-width: 768px) {
      .timetable td { border-radius: 16px; padding: 1.25rem 0.5rem; font-size: 1rem; }
    }

    .timetable td.can-swap:hover {
      background: rgba(255, 255, 255, 0.08) !important;
      border-color: var(--accent-bright);
      cursor: pointer;
    }

    .day-cell {
      background: var(--accent-dim) !important;
      color: var(--accent-bright);
      font-weight: 700;
      border: 1px solid rgba(99, 102, 241, 0.25) !important;
      font-size: 0.65rem !important;
      white-space: nowrap;
    }
    @media (min-width: 768px) {
      .day-cell { font-size: 0.875rem !important; }
    }

    .subject-cell {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.15), rgba(255,255,255,0.05));
      color: #fff;
      font-weight: 600;
      border-radius: 8px;
      padding: 6px 4px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: var(--transition);
      font-size: 0.7rem;
      /* FIX: text must stay inside cell */
      word-break: break-word;
      overflow-wrap: break-word;
      hyphens: auto;
      line-height: 1.3;
    }
    @media (min-width: 768px) {
      .subject-cell { border-radius: 12px; padding: 12px; font-size: 0.875rem; }
    }

    .subject-cell:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .subject-cell strong {
      display: block;
      font-size: 0.7rem;
      word-break: break-word;
      overflow-wrap: break-word;
    }
    @media (min-width: 768px) {
      .subject-cell strong { font-size: inherit; }
    }

    .subject-cell.selected {
      outline: 3px solid var(--accent-bright);
      outline-offset: 2px;
    }

    .empty-cell {
      opacity: 0.2;
      font-size: 0.65rem;
      font-style: italic;
    }

    /* ── LAB CARD ── */
    .lab-card {
      background: linear-gradient(135deg, var(--accent), #312e81);
      border-radius: 10px;
      padding: 6px;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
    @media (min-width: 768px) {
      .lab-card { border-radius: 14px; padding: 12px; gap: 8px; }
    }

    .lab-title {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      opacity: 0.7;
    }

    .lab-batch {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(0, 0, 0, 0.2);
      padding: 4px 6px;
      border-radius: 6px;
    }

    .lab-batch-name {
      background: #fff;
      color: var(--accent);
      font-weight: 800;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 9px;
      flex-shrink: 0;
    }

    .lab-details { text-align: left; line-height: 1.2; min-width: 0; }
    .lab-subject {
      font-size: 10px;
      font-weight: 600;
      word-break: break-word;
      overflow-wrap: break-word;
    }
    .lab-faculty {
      font-size: 9px;
      opacity: 0.8;
      word-break: break-word;
      overflow-wrap: break-word;
    }

    /* ── TOAST & MESSAGE ── */
    .toast, #message-box {
      position: fixed;
      bottom: 16px;
      right: 16px;
      left: 16px;
      padding: 14px 20px;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.97);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-card);
      color: white;
      z-index: 10000;
      transform: translateY(120px);
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      font-size: 0.875rem;
    }
    @media (min-width: 640px) {
      .toast, #message-box {
        left: auto;
        right: 30px;
        bottom: 30px;
        max-width: 420px;
        transform: translateX(460px);
      }
    }

    .toast.show, #message-box.show {
      transform: translateY(0) !important;
      opacity: 1;
    }
    @media (min-width: 640px) {
      .toast.show, #message-box.show {
        transform: translateX(0) !important;
      }
    }

    .toast-success, .message-success { border-left: 4px solid #10b981; }
    .toast-error, .message-error { border-left: 4px solid #ef4444; }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 12, 20, 0.85);
      backdrop-filter: blur(10px);
      z-index: 11000;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .loading-overlay.show { display: flex; }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.05);
      border-left-color: var(--accent-bright);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    /* ── SCROLL BAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.5s ease forwards; }

    /* ── HEADER: STACK ON MOBILE ── */
    header { 
      flex-direction: column !important; 
    }
    @media (min-width: 768px) {
      header { flex-direction: row !important; }
    }

    /* ── PAGE TITLE: SCALE DOWN ON MOBILE ── */
    h1.text-6xl {
      font-size: clamp(2rem, 10vw, 3.75rem) !important;
    }

    /* ── USER PROFILE CARD ── */
    #user-profile-summary {
      width: 100%;
    }
    @media (min-width: 768px) {
      #user-profile-summary { width: auto; }
    }

    /* ── TIMETABLE OUTPUT CONTROLS: WRAP ON MOBILE ── */
    #timetable-output > div:first-child {
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    /* Buttons row in timetable header */
    #timetable-output > div:first-child > div {
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    /* View by row */
    #timetable-output > div:nth-child(2) {
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    /* ── TIMETABLE SECTION HEADERS ── */
    #timetable-container .glass h3 {
      font-size: clamp(1rem, 4vw, 1.5rem);
      word-break: break-word;
    }

    /* ── GENERATE / LOAD SAMPLE BUTTONS: STACK ON MOBILE ── */
    .text-center.my-8 {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    @media (min-width: 640px) {
      .text-center.my-8 { flex-direction: row; justify-content: center; }
    }

    /* ── FACULTY ASSIGNMENT GRID ── */
    #faculty-subject-assignment > div {
      grid-template-columns: 1fr !important;
    }
    @media (min-width: 480px) {
      #faculty-subject-assignment > div {
        grid-template-columns: 1fr 1fr !important;
      }
    }

    /* ── WORKING DAYS FLEX WRAP (already has it, just ensure gap) ── */
    #workingDays {
      row-gap: 8px;
    }

    /* ── SCROLL HINT BADGE FOR TIMETABLE ── */
    .scroll-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--accent-bright);
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 6px;
      opacity: 0.8;
    }
    @media (min-width: 768px) {
      .scroll-hint { display: none; }
    }

    /* ── SAVED TIMETABLES CARD GRID ── */
    #saved-timetables-list {
      grid-template-columns: 1fr !important;
    }
    @media (min-width: 640px) {
      #saved-timetables-list { grid-template-columns: repeat(2, 1fr) !important; }
    }
    @media (min-width: 1024px) {
      #saved-timetables-list { grid-template-columns: repeat(3, 1fr) !important; }
    }

    /* ── STATS CARDS ── */
    #admin-stats {
      grid-template-columns: 1fr !important;
    }
    @media (min-width: 640px) {
      #admin-stats { grid-template-columns: repeat(3, 1fr) !important; }
    }
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
</div>
<div id="toast-container"></div>

<div class="container mx-auto animate-fade-in">
    <header class="relative mb-8 flex md:flex-row md:items-end justify-between gap-4">
        <div class="max-w-3xl">
            <h1 class="text-6xl font-black tracking-tight text-white mb-3 bg-clip-text text-transparent bg-gradient-to-r from-white via-blue-200 to-slate-500">
                Timetable Hub
            </h1>
            <p class="text-base md:text-xl text-slate-400 font-medium">
                Design and organize your institutional schedules with professional precision.
            </p>
        </div>
        <div id="user-profile-summary" class="glass rounded-2xl p-3 md:p-4 flex items-center gap-3 border border-blue-500/20 flex-wrap">
            <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-lg font-bold text-white flex-shrink-0" id="user-avatar">?</div>
            <div class="min-w-0">
                <p class="text-xs text-slate-400 font-medium uppercase tracking-wider" id="user-role-badge">Role</p>
                <p class="text-white font-bold text-sm truncate" id="user-email-display">loading...</p>
            </div>
        </div>
    </header>

    <div id="admin-stats" class="grid gap-4 mb-8 hidden">
        <div class="stats-card rounded-3xl p-5">
            <p class="text-slate-400 text-sm font-medium mb-1">Total Classes</p>
            <h3 class="text-3xl font-black text-white" id="stat-classes">0</h3>
        </div>
        <div class="stats-card rounded-3xl p-5">
            <p class="text-slate-400 text-sm font-medium mb-1">Faculty Members</p>
            <h3 class="text-3xl font-black text-white" id="stat-faculty">0</h3>
        </div>
        <div class="stats-card rounded-3xl p-5">
            <p class="text-slate-400 text-sm font-medium mb-1">Saved Timetables</p>
            <h3 class="text-3xl font-black text-white" id="stat-saved">0</h3>
        </div>
    </div>

    <main id="main-content">
        <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
            <div class="card lg:col-span-4">
                <div class="tools">
                    <div class="circle red"></div><div class="circle yellow"></div><div class="circle green"></div>
                </div>
                <h2 class="text-lg md:text-xl font-semibold mb-4 border-b border-gray-700 pb-2">1. Basic Settings</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label for="institutionName" class="block text-sm font-medium text-gray-300 mb-1">Institution Name</label>
                        <input type="text" id="institutionName" value="My Awesome University" class="w-full placeholder-gray-400"/>
                    </div>
                    <div>
                        <label for="periodsPerDay" class="block text-sm font-medium text-gray-300 mb-1">Periods per Day</label>
                        <input type="number" id="periodsPerDay" value="8" min="1" max="20" class="w-full"/>
                        <div class="mt-3">
                          <label class="block text-sm text-gray-300 mb-1">Lunch Break Period</label>
                          <input type="number" id="lunchBreak" placeholder="e.g. 4" min="1" class="w-full"/>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Working Days</label>
                        <div id="workingDays" class="flex flex-wrap gap-x-4 gap-y-2 mt-2">
                            <label class="flex items-center text-gray-200 text-sm"><input type="checkbox" class="mr-2" value="Monday" checked />Mon</label>
                            <label class="flex items-center text-gray-200 text-sm"><input type="checkbox" class="mr-2" value="Tuesday" checked />Tue</label>
                            <label class="flex items-center text-gray-200 text-sm"><input type="checkbox" class="mr-2" value="Wednesday" checked />Wed</label>
                            <label class="flex items-center text-gray-200 text-sm"><input type="checkbox" class="mr-2" value="Thursday" checked />Thu</label>
                            <label class="flex items-center text-gray-200 text-sm"><input type="checkbox" class="mr-2" value="Friday" checked />Fri</label>
                            <label class="flex items-center text-gray-200 text-sm"><input type="checkbox" class="mr-2" value="Saturday" />Sat</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="tools"><div class="circle red"></div><div class="circle yellow"></div><div class="circle green"></div></div>
                <h2 class="text-lg md:text-xl font-semibold mb-4 border-b border-gray-700 pb-2">2. Classes / Sections</h2>
                <div id="classes-list" class="max-h-[180px] overflow-y-auto pr-1"></div>
                <div class="mt-4">
                    <input type="text" id="new-class-name" placeholder="e.g., Grade 10-A" class="w-full mb-3"/>
                    <button id="add-class-btn" class="btn-secondary w-full">Add Class</button>
                </div>
            </div>

            <div class="card">
                <div class="tools"><div class="circle red"></div><div class="circle yellow"></div><div class="circle green"></div></div>
                <h2 class="text-lg md:text-xl font-semibold mb-4 border-b border-gray-700 pb-2">3. Subjects</h2>
                <div id="subjects-list" class="max-h-[180px] overflow-y-auto pr-1"></div>
                <div class="mt-4">
                    <input type="text" id="new-subject-name" placeholder="e.g., Physics" class="w-full mb-3"/>
                    <button id="add-subject-btn" class="btn-secondary w-full">Add Subject</button>
                </div>
            </div>

            <div class="card lg:col-span-2">
                <div class="tools"><div class="circle red"></div><div class="circle yellow"></div><div class="circle green"></div></div>
                <h2 class="text-lg md:text-xl font-semibold mb-4 border-b border-gray-700 pb-2">4. Assign Subjects to Grades with Hours</h2>
                <div id="grade-subject-assignment" class="subject-grade-selector"></div>
            </div>

            <div class="card lg:col-span-2">
                <div class="tools"><div class="circle red"></div><div class="circle yellow"></div><div class="circle green"></div></div>
                <h2 class="text-lg md:text-xl font-semibold mb-4 border-b border-gray-700 pb-2">5. Faculty</h2>
                <div id="faculty-list" class="max-h-[180px] overflow-y-auto pr-1"></div>
                <div class="mt-4">
                    <input type="text" id="new-faculty-name" placeholder="e.g., Dr. Smith" class="w-full mb-3"/>
                    <div id="faculty-subject-assignment" class="space-y-2 mb-3"></div>
                    <button id="add-faculty-btn" class="btn-secondary w-full">Add Faculty</button>
                </div>
            </div>
        </div>

        <div class="text-center my-8">
            <button id="generate-btn" class="btn-primary text-base md:text-lg w-full sm:w-auto">Generate Timetable</button>
            <button id="load-sample-btn" class="btn-secondary text-base md:text-lg w-full sm:w-auto">Load Sample Data</button>
        </div>
    </main>

    <div id="timetable-output" class="hidden">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3">
            <h2 id="timetable-header" class="text-xl md:text-3xl font-bold text-white min-w-0 break-words"></h2>
            <div class="flex items-center gap-2 flex-wrap">
                <button id="back-to-edit-btn" class="btn-secondary text-sm">Back to Edit</button>
                <button id="download-excel-btn" class="btn-primary text-sm" style="background:#059669;">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Excel
                </button>
                <button id="download-pdf-btn" class="btn-primary text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    PDF
                </button>
            </div>
        </div>

        <div class="flex justify-center items-center mb-6 gap-2 text-white flex-wrap">
            <span class="font-medium text-sm">View by:</span>
            <button id="view-by-class-btn" class="view-btn active">Class</button>
            <button id="view-by-faculty-btn" class="view-btn">Faculty</button>
        </div>

        <div id="timetable-container" class="space-y-8 md:space-y-12"></div>
    </div>
</div>

<div id="message-box"></div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');

        if (!token) {
            window.location.href = '/loginpage.html';
            return;
        }

        const loadingOverlay = document.getElementById('loading-overlay');

        function showLoading(show) {
            if (show) loadingOverlay.classList.add('show');
            else loadingOverlay.classList.remove('show');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type} animate-fade-in`;
            
            const icon = type === 'success' 
                ? '<svg class="w-5 h-5 text-emerald-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>'
                : '<svg class="w-5 h-5 text-rose-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';

            toast.innerHTML = `${icon}<span class="text-sm font-medium text-slate-200" style="word-break:break-word">${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        // Fetch User Info
        showLoading(true);
        try {
            const userRes = await fetch('/api/auth/me', {
                headers: { 'x-auth-token': token }
            });
            if (userRes.ok) {
                const userData = await userRes.json();
                document.getElementById('user-email-display').textContent = userData.email;
                document.getElementById('user-role-badge').textContent = userData.role;
                document.getElementById('user-avatar').textContent = userData.email.charAt(0).toUpperCase();
                if (userData.role === 'admin') {
                    document.getElementById('admin-stats').classList.remove('hidden');
                }
            }
        } catch (err) {
            console.error('Failed to fetch user data');
        } finally {
            showLoading(false);
        }

        // Logout button
        const profileSummary = document.getElementById('user-profile-summary');
        const logoutBtn = document.createElement('button');
        logoutBtn.textContent = 'Logout';
        logoutBtn.className = 'ml-auto btn-secondary text-xs py-2 px-3';
        logoutBtn.onclick = () => { localStorage.clear(); window.location.href = '/loginpage.html'; };
        profileSummary.appendChild(logoutBtn);

        // Role-based UI
        if (role !== 'admin') {
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('timetable-output').classList.remove('hidden');
            document.getElementById('back-to-edit-btn').classList.add('hidden');
            document.getElementById('view-by-class-btn').parentElement.style.display = 'none';
            document.getElementById('timetable-header').textContent = 'Institution Timetables';
            loadSavedTimetables();
        } else {
            const savedSection = document.createElement('div');
            savedSection.className = 'card lg:col-span-4 animate-fade-in';
            savedSection.innerHTML = `
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 border-b border-gray-700 pb-4 gap-3">
                    <h2 class="text-xl md:text-2xl font-bold text-white">Saved Timetables</h2>
                    <input type="text" id="timetable-search" placeholder="Search by title..." class="text-sm py-2 px-4 rounded-xl border border-slate-700 w-full sm:w-64" style="background:rgba(30,41,59,0.8);"/>
                </div>
                <div id="saved-timetables-list" class="grid gap-4">
                    <div class="col-span-full py-12 text-center text-slate-500"><p>Loading your saved schedules...</p></div>
                </div>
            `;
            document.querySelector('main .grid').appendChild(savedSection);
            
            document.addEventListener('input', (e) => {
                if (e.target.id === 'timetable-search') filterTimetables(e.target.value);
            });

            loadSavedTimetables();
        }

        let classes = [];
        let subjects = [];
        let faculty = [];
        let subjectGradeMap = {};
        let generatedTimetable = null;
        let currentView = 'class';
        let allTimetables = [];
        let swapSelection = null;
        let currentTimetableId = null;

        function handleCellClick(className, day, period) {
            if (role !== 'admin' || currentView !== 'class') return;
            if (!swapSelection) {
                swapSelection = { className, day, period };
                renderCurrentView();
                showToast('Selected period to swap. Click another to swap.', 'success');
            } else {
                const cell1 = generatedTimetable[swapSelection.className][swapSelection.day][swapSelection.period];
                const cell2 = generatedTimetable[className][day][period];
                generatedTimetable[swapSelection.className][swapSelection.day][swapSelection.period] = cell2;
                generatedTimetable[className][day][period] = cell1;
                swapSelection = null;
                renderCurrentView();
                showToast('Periods swapped successfully!', 'success');
            }
        }

        async function loadSavedTimetables() {
            try {
                const response = await fetch('/api/timetable', { headers: { 'x-auth-token': token } });
                if (response.status === 401) { localStorage.clear(); window.location.href = '/loginpage.html'; return; }
                allTimetables = await response.json();
                renderTimetableList(allTimetables);
                if (role === 'admin') document.getElementById('stat-saved').textContent = allTimetables.length;
            } catch (err) { console.error(err); }
        }

        function filterTimetables(query) {
            const filtered = allTimetables.filter(t => t.title.toLowerCase().includes(query.toLowerCase()));
            renderTimetableList(filtered);
        }

        function renderTimetableList(timetables) {
            const list = document.getElementById('saved-timetables-list') || document.getElementById('timetable-container');
            if (list.id === 'timetable-container' && role !== 'admin') list.innerHTML = '';
            else if (document.getElementById('saved-timetables-list')) document.getElementById('saved-timetables-list').innerHTML = '';

            if (timetables.length === 0) {
                const msg = '<div class="col-span-full py-12 text-center text-slate-500"><p>No schedules found.</p></div>';
                if (role === 'admin') document.getElementById('saved-timetables-list').innerHTML = msg;
                else list.innerHTML = msg;
                return;
            }

            timetables.forEach(t => {
                const card = document.createElement('div');
                card.className = 'glass p-4 md:p-6 rounded-3xl border border-slate-700/50 hover:border-blue-500/50 cursor-pointer transition-all hover:bg-slate-800/50 group animate-fade-in';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-10 h-10 rounded-2xl bg-blue-600/20 flex items-center justify-center text-blue-500 flex-shrink-0">
                           <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        ${role === 'admin' ? '<button class="text-slate-500 hover:text-red-500 transition-colors delete-btn p-2" data-id="'+t._id+'"><svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>' : ''}
                    </div>
                    <div>
                        <h3 class="font-bold text-base md:text-lg text-white group-hover:text-blue-400 transition-colors break-words">${t.title}</h3>
                        <p class="text-xs text-slate-400 mt-1">Created: ${new Date(t.createdAt).toLocaleDateString()}</p>
                    </div>
                `;
                card.onclick = (e) => {
                    if (e.target.closest('.delete-btn')) { deleteTimetable(e.target.closest('.delete-btn').dataset.id); return; }
                    displayTimetable(t.data, t.title, t._id);
                };
                if (role === 'admin') document.getElementById('saved-timetables-list').appendChild(card);
                else list.appendChild(card);
            });
        }

        async function deleteTimetable(id) {
            if (!confirm('Are you sure you want to delete this timetable?')) return;
            showLoading(true);
            try {
                const response = await fetch(`/api/timetable/${id}`, { method: 'DELETE', headers: { 'x-auth-token': token } });
                if (response.status === 401) { localStorage.clear(); window.location.href = '/loginpage.html'; return; }
                if (!response.ok) throw new Error('Delete failed');
                loadSavedTimetables();
                if (currentTimetableId === id) { currentTimetableId = null; backToEditBtn.click(); }
                showToast('Timetable deleted', 'success');
            } catch (err) {
                showToast('Delete failed', 'error');
            } finally { showLoading(false); }
        }

        async function saveTimetable(data, title) {
            const saveBtn = document.getElementById('save-backend-btn');
            const originalText = saveBtn.innerHTML;
            saveBtn.disabled = true;
            saveBtn.innerHTML = `<svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Saving...`;
            try {
                const url = currentTimetableId ? `/api/timetable/${currentTimetableId}` : '/api/timetable';
                const method = currentTimetableId ? 'PUT' : 'POST';
                const response = await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'x-auth-token': token }, body: JSON.stringify({ title, data }) });
                if (response.status === 401) { localStorage.clear(); window.location.href = '/loginpage.html'; return; }
                if (response.ok) {
                    const savedData = await response.json();
                    if (!currentTimetableId) currentTimetableId = savedData._id;
                    showToast(`Timetable ${method === 'PUT' ? 'updated' : 'saved'} successfully!`, 'success');
                    loadSavedTimetables();
                } else {
                    const errorData = await response.json();
                    showToast(errorData.errors ? errorData.errors.map(e => e.msg).join(', ') : 'Failed to save', 'error');
                }
            } catch (err) {
                showToast('Server error', 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalText;
            }
        }

        function displayTimetable(data, title, id = null) {
            generatedTimetable = data;
            currentTimetableId = id;
            const saveBtn = document.getElementById('save-backend-btn');
            if (saveBtn) {
                saveBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg> ${id ? 'Update' : 'Save'}`;
            }
            document.getElementById('timetable-header').textContent = title;
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('timetable-output').classList.remove('hidden');

            const backBtn = document.getElementById('back-to-edit-btn');
            backBtn.classList.remove('hidden');
            backBtn.textContent = role === 'admin' ? 'Back to Edit' : 'Back to List';
            document.getElementById('view-by-class-btn').parentElement.style.display = 'flex';

            // ✅ SCROLL TO TOP — makes it feel like a new page
            window.scrollTo({ top: 0, behavior: 'smooth' });

            renderCurrentView();
        }

        // Save button injection
        const downloadExcelBtn = document.getElementById('download-excel-btn');
        const saveBtn = document.createElement('button');
        saveBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg> Save`;
        saveBtn.className = 'btn-primary text-sm';
        saveBtn.id = 'save-backend-btn';
        saveBtn.style.display = role === 'admin' ? 'inline-flex' : 'none';
        saveBtn.onclick = () => {
            const title = document.getElementById('institutionName').value || 'Institution Timetable';
            saveTimetable(generatedTimetable, title);
        };
        downloadExcelBtn.before(saveBtn);

        // Excel Export
        downloadExcelBtn.addEventListener('click', () => {
            if (!generatedTimetable) return;
            const wb = XLSX.utils.book_new();
            Object.keys(generatedTimetable).forEach(className => {
                const data = [];
                const workingDays = Object.keys(generatedTimetable[className]);
                const periodsPerDay = generatedTimetable[className][workingDays[0]].length;
                data.push(['Day / Period', ...Array.from({length: periodsPerDay}, (_, i) => `Period ${i+1}`)]);
                workingDays.forEach(day => {
                    const row = [day];
                    generatedTimetable[className][day].forEach(period => {
                        row.push(period ? `${period.subject || 'LAB'} (${period.faculty || ''})` : '-');
                    });
                    data.push(row);
                });
                const ws = XLSX.utils.aoa_to_sheet(data);
                XLSX.utils.book_append_sheet(wb, ws, className);
            });
            XLSX.writeFile(wb, `${document.getElementById('institutionName').value}_Timetable.xlsx`);
            showToast('Excel file downloaded!', 'success');
        });

    const addClassBtn = document.getElementById('add-class-btn');
    const newClassNameInput = document.getElementById('new-class-name');
    const classesList = document.getElementById('classes-list');
    const addSubjectBtn = document.getElementById('add-subject-btn');
    const newSubjectNameInput = document.getElementById('new-subject-name');
    const subjectsList = document.getElementById('subjects-list');
    const gradeSubjectAssignmentDiv = document.getElementById('grade-subject-assignment');
    const addFacultyBtn = document.getElementById('add-faculty-btn');
    const newFacultyNameInput = document.getElementById('new-faculty-name');
    const facultyList = document.getElementById('faculty-list');
    const facultySubjectAssignment = document.getElementById('faculty-subject-assignment');
    const generateBtn = document.getElementById('generate-btn');
    const loadSampleBtn = document.getElementById('load-sample-btn');
    const timetableOutput = document.getElementById('timetable-output');
    const timetableContainer = document.getElementById('timetable-container');
    const downloadPdfBtn = document.getElementById('download-pdf-btn');

    downloadPdfBtn.addEventListener('click', () => {
        const element = document.getElementById('timetable-container');
        if (!element || element.innerHTML.trim() === '') { showToast("Nothing to export", "error"); return; }
        showToast("Generating PDF... Please wait.", "success");

        const originalWidth = element.style.width;
        const originalMaxWidth = element.style.maxWidth;
        element.style.width = '1400px';
        element.style.maxWidth = '1400px';

        const pdfFixStyle = document.createElement('style');
        pdfFixStyle.id = 'pdf-fix-styles';
        pdfFixStyle.innerHTML = `
            #timetable-container, #timetable-container * { opacity: 1 !important; }
            #timetable-container th, #timetable-container td, #timetable-container strong, 
            #timetable-container span, #timetable-container h3, #timetable-container div { color: #ffffff !important; }
            #timetable-container .empty-cell { color: #94a3b8 !important; }
            #timetable-container .subject-cell, #timetable-container .lab-card, #timetable-container .glass {
                box-shadow: none !important; backdrop-filter: none !important; -webkit-backdrop-filter: none !important;
            }
            #timetable-container table { background-color: #0f172a !important; }
        `;
        document.head.appendChild(pdfFixStyle);

        const institutionName = document.getElementById('institutionName').value || 'Institution';
        const opt = {
            margin: 0.4,
            filename: `${institutionName}_Timetable.pdf`,
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, useCORS: true, backgroundColor: '#080c14', logging: false },
            jsPDF: { unit: 'in', format: 'a3', orientation: 'landscape' },
            pagebreak: { mode: ['avoid-all'] }
        };

        html2pdf().set(opt).from(element).save().then(() => {
            showToast("PDF downloaded!", "success");
            element.style.width = originalWidth;
            element.style.maxWidth = originalMaxWidth;
            const fix = document.getElementById('pdf-fix-styles');
            if (fix) document.head.removeChild(fix);
        }).catch(err => {
            showToast("Failed to generate PDF.", "error");
            element.style.width = originalWidth;
            element.style.maxWidth = originalMaxWidth;
            const fix = document.getElementById('pdf-fix-styles');
            if (fix) document.head.removeChild(fix);
        });
    });

    const backToEditBtn = document.getElementById('back-to-edit-btn');
    const viewByClassBtn = document.getElementById('view-by-class-btn');
    const viewByFacultyBtn = document.getElementById('view-by-faculty-btn');

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function renderClasses() {
        classesList.innerHTML = '';
        if (classes.length === 0) {
            classesList.innerHTML = '<p class="text-sm text-gray-500">No classes added yet.</p>';
        } else {
            classes.forEach((c, index) => {
                const div = document.createElement('div');
                div.className = 'dynamic-list-item animate-fade-in';
                div.innerHTML = `<span class="flex-grow font-medium text-sm">${c.name}</span><button class="btn-danger remove-class" data-index="${index}">Remove</button>`;
                classesList.appendChild(div);
            });
        }
        if (role === 'admin') document.getElementById('stat-classes').textContent = classes.length;
        renderGradeSubjectAssignment();
    }

    function renderSubjects() {
        subjectsList.innerHTML = '';
        if (subjects.length === 0) {
            subjectsList.innerHTML = '<p class="text-sm text-gray-500">No subjects added yet.</p>';
        } else {
            const subjectColors = generateColorPalette(subjects.map(s => s.name));
            subjects.forEach((s, index) => {
                const color = subjectColors[s.name];
                const div = document.createElement('div');
                div.className = 'dynamic-list-item animate-fade-in';
                div.innerHTML = `
                    <div class="w-3 h-3 rounded-full flex-shrink-0" style="background-color:${color};box-shadow:0 0 8px ${color}40;"></div>
                    <div class="flex-grow min-w-0">
                        <strong class="text-white text-sm">${s.name}</strong>
                        ${s.type === "LAB" ? '<span style="color:#a78bfa;font-size:10px;"> [LAB]</span>' : ''}
                    </div>
                    <button class="btn-danger remove-subject" data-index="${index}">Remove</button>`;
                subjectsList.appendChild(div);
            });
        }
        renderFacultySubjectCheckboxes();
        renderGradeSubjectAssignment();
    }

    function renderFaculty() {
        facultyList.innerHTML = '';
        if (faculty.length === 0) {
            facultyList.innerHTML = '<p class="text-sm text-gray-500">No faculty added yet.</p>';
        } else {
            faculty.forEach((f, index) => {
                const div = document.createElement('div');
                div.className = 'dynamic-list-item animate-fade-in';
                div.innerHTML = `
                 <div class="flex-grow min-w-0">
                    <strong class="text-white text-sm block truncate">${f.name}</strong>
                    <div class="text-xs text-slate-400 mt-0.5 truncate">Expertise: ${f.subjects.join(', ') || 'General'}</div>
                </div>
                <div class="flex gap-1 shrink-0">
                    <button class="btn-secondary edit-faculty text-xs py-1 px-2" data-index="${index}">Edit</button>
                    <button class="btn-danger remove-faculty" data-index="${index}">✕</button>
                </div>`;
                facultyList.appendChild(div);
            });
        }

                        subjectGradeMap[c.name][s.name] = Number(hoursInput.value) || 1;

                    } else {
                        hoursInput.disabled = true;
                        subjectGradeMap[c.name][s.name] = 0;
                        hoursInput.value = '';
                    }
                });

                label.appendChild(leftDiv);

            });

    generateBtn.addEventListener('click', () => {
        function getLabGroups(subjectsInGrade) {
            const labSubjects = Object.keys(subjectsInGrade).filter(sub => {
                const s = subjects.find(x => x.name === sub);
                return s?.type === "LAB" && subjectsInGrade[sub] > 0;
            });
            const uniqueLabs = [...new Set(labSubjects)];
            const groups = [];
            for (let i = 0; i < uniqueLabs.length; i += 3) groups.push(uniqueLabs.slice(i, i + 3));
            return groups;
        }

        const lunchBreakInput = document.getElementById("lunchBreak").value;
        const lunchBreakIndex = parseInt(lunchBreakInput) - 1;
        if (isNaN(lunchBreakIndex)) { showToast("Please enter a valid lunch break period", "error"); return; }

        const periodsPerDay = parseInt(document.getElementById('periodsPerDay').value, 10);
        const workingDaysCheckboxes = document.querySelectorAll('#workingDays input[type="checkbox"]:checked');
        const workingDays = Array.from(workingDaysCheckboxes).map(cb => cb.value);

        if (classes.length === 0 || subjects.length === 0 || faculty.length === 0 || workingDays.length === 0) {
            showToast('Please add at least one class, subject, faculty, and select working days.', 'error');
            return;
        }

        const allAssignedSubjects = [...new Set(Object.values(subjectGradeMap).flatMap(obj => Object.keys(obj).filter(k => obj[k] > 0)))];
        for (const subjectName of allAssignedSubjects) {
            if (!faculty.some(f => f.subjects.includes(subjectName))) {
                showToast(`Error: No faculty for ${subjectName}`, 'error');
                return;
            }
        }

        const timetable = {};
        classes.forEach(c => {
            timetable[c.name] = {};
            workingDays.forEach(day => { timetable[c.name][day] = new Array(periodsPerDay).fill(null); });
        });

        let success = true;
        for (const c of classes) {
            const subjectsInGrade = JSON.parse(JSON.stringify(subjectGradeMap[c.name] || {}));
            let labGroups = getLabGroups(subjectsInGrade);
            labGroups = shuffleArray(labGroups);

            for (const group of labGroups) {
                const usedDaysForGroup = new Set();
                const sessionsNeeded = Math.max(1, Math.floor((subjectsInGrade[group[0]] || 0) / 2));

                for (let session = 0; session < sessionsNeeded; session++) {
                    let placed = false;
                    const shuffledDays = shuffleArray([...workingDays]);

                    for (const day of shuffledDays) {
                        if (usedDaysForGroup.has(day)) continue;
                        const startSlots = shuffleArray(Array.from({ length: periodsPerDay - 1 }, (_, i) => i));

                        for (const start of startSlots) {
                            if (start <= lunchBreakIndex && start + 1 >= lunchBreakIndex) continue;
                            if (timetable[c.name][day][start] !== null || timetable[c.name][day][start + 1] !== null) continue;

                            let batchData = [];
                            let valid = true;
                            const batches = ["A", "B", "C"].slice(0, group.length);
                            const usedSubjects = new Set();

                            for (let i = 0; i < group.length; i++) {
                                const subjectName = group[(i + session) % group.length];
                                if (usedSubjects.has(subjectName)) { valid = false; break; }
                                usedSubjects.add(subjectName);
                                const facultyOptions = faculty.filter(f =>
                                    f.subjects.includes(subjectName) &&
                                    !isFacultyBusy(timetable, f.name, day, start) &&
                                    !isFacultyBusy(timetable, f.name, day, start + 1)
                                );
                                if (facultyOptions.length === 0) { valid = false; break; }
                                const randomFaculty = shuffleArray([...facultyOptions])[0];
                                batchData.push({ batch: batches[i], subject: subjectName, faculty: randomFaculty.name });
                            }

                            if (!valid) continue;
                            const labSlot = { type: "LAB", batches: batchData };
                            timetable[c.name][day][start] = labSlot;
                            timetable[c.name][day][start + 1] = labSlot;
                            group.forEach(sub => { subjectsInGrade[sub] -= 2; });
                            placed = true;
                            usedDaysForGroup.add(day);
                            break;
                        }
                        if (placed) break;
                    }

                    if (!placed) { showToast("Not enough space for all lab sessions", "error"); return; }
                }
            }

            const shuffledSubjects = shuffleArray(Object.keys(subjectsInGrade));
            for (const subjectName of shuffledSubjects) {
                let hours = subjectsInGrade[subjectName];
                if (hours <= 0) continue;
                const subjectObj = subjects.find(s => s.name === subjectName);
                if (subjectObj?.type === "LAB") continue;
                if (hours <= 0) continue;

                let placedHours = 0;
                let dayIndex = 0;
                const dayCount = workingDays.length;
                const periods = [...Array(periodsPerDay).keys()];
                const shuffledDays = shuffleArray([...workingDays]);
                let failedAttempts = 0;

                while (placedHours < hours) {
                    if (dayIndex >= dayCount) dayIndex = 0;
                    const day = shuffledDays[dayIndex];
                    const shuffledPeriods = shuffleArray([...periods]);
                    let placedThisDay = false;

                    for (const period of shuffledPeriods) {
                        if (timetable[c.name][day][period] !== null) continue;
                        if (period === lunchBreakIndex) continue;
                        const availableFaculty = faculty.filter(f =>
                            f.subjects.includes(subjectName) && !isFacultyBusy(timetable, f.name, day, period)
                        );
                        if (availableFaculty.length > 0) {
                            const assignedFaculty = availableFaculty.sort((a,b) => getFacultyLoad(timetable, a.name) - getFacultyLoad(timetable, b.name))[0];
                            timetable[c.name][day][period] = { subject: subjectName, faculty: assignedFaculty.name };
                            placedHours++;
                            placedThisDay = true;
                            failedAttempts = 0;
                            break;
                        }
                    }

                    if (!placedThisDay) {
                        dayIndex++;
                        failedAttempts++;
                        if (failedAttempts >= dayCount) {
                            showToast(`Error: Couldn't fit all ${hours} hrs of ${subjectName}. Grid may be full!`, 'error');
                            success = false;
                            break;
                        }
                    } else { dayIndex++; }
                    if (!success) break;
                }
                if (!success) break;
            }
            if (!success) break;
        }

        if (success) {
            for (const className in timetable) {
                for (const day of workingDays) {
                    if (!timetable[className][day][lunchBreakIndex]) {
                        timetable[className][day][lunchBreakIndex] = { type: "LUNCH" };
                    }
                }
            }

            generatedTimetable = timetable;
            currentTimetableId = null;
            const sb = document.getElementById('save-backend-btn');
            if (sb) sb.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg> Save`;
            
            renderCurrentView();
            showToast('Timetable generated successfully!', 'success');
            timetableOutput.classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');
            // ✅ Scroll to top — feels like a new page
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });

    function isFacultyBusy(timetable, facultyName, day, period) {
        for (const className in timetable) {
            const slot = timetable[className]?.[day]?.[period];
            if (!slot) continue;
            if (slot.type === "LUNCH") continue;
            if (slot.faculty === facultyName) return true;
            if (slot.type === "LAB") {
                for (const b of slot.batches) { if (b.faculty === facultyName) return true; }
            }
        }
        return false;
    }

    function getFacultyLoad(timetable, facultyName) {
        let load = 0;
        for (const className in timetable) {
            for (const day in timetable[className]) {
                for (const slot of timetable[className][day]) {
                    if (!slot || slot.type === "LUNCH") continue;
                    if (slot.faculty === facultyName) load++;
                    if (slot.type === "LAB") { for (const b of slot.batches) { if (b.faculty === facultyName) load++; } }
                }
            }
        }
        return load;
    }

    function renderTimetableByFaculty(timetable, workingDays, periodsPerDay) {
        timetableContainer.innerHTML = '';
        const discoveredFaculty = new Set();
        const discoveredSubjects = new Set();

        if (!timetable || Object.keys(timetable).length === 0) {
            timetableContainer.innerHTML = '<p class="text-white text-center mt-10">No timetable data loaded.</p>';
            return;
        }

        Object.values(timetable).forEach(days => {
            Object.values(days).forEach(periods => {
                periods.forEach(slot => {
                    if (!slot) return;
                    if (slot.faculty) { discoveredFaculty.add(slot.faculty); if (slot.subject) discoveredSubjects.add(slot.subject); }
                    if (slot.type === "LAB" && slot.batches) { slot.batches.forEach(b => { if (b.faculty) discoveredFaculty.add(b.faculty); if (b.subject) discoveredSubjects.add(b.subject); }); }
                });
            });
        });

        const sortedFacultyList = Array.from(discoveredFaculty).sort();
        const subjectColors = generateColorPalette(Array.from(discoveredSubjects));

        if (sortedFacultyList.length === 0) {
            timetableContainer.innerHTML = '<p class="text-white text-center mt-10">No faculty assignments found.</p>';
            return;
        }

        sortedFacultyList.forEach(fName => {
            const containerDiv = document.createElement('div');
            containerDiv.className = 'glass p-4 md:p-6 rounded-2xl animate-fade-in border border-slate-700/50 mb-8 md:mb-12';

            const header = document.createElement('h3');
            header.className = 'text-xl md:text-2xl font-bold mb-3 text-center text-white break-words';
            header.textContent = `Faculty: ${fName}`;
            containerDiv.appendChild(header);

            // Scroll hint
            const scrollHint = document.createElement('div');
            scrollHint.className = 'scroll-hint';
            scrollHint.innerHTML = `<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg> Scroll horizontally to see all periods`;
            containerDiv.appendChild(scrollHint);

            const scrollWrapper = document.createElement('div');
            scrollWrapper.className = 'timetable-scroll-wrapper';

            const table = document.createElement('table');
            table.className = 'w-full border-collapse timetable';

            let thead = '<thead><tr><th style="min-width:60px">Day</th>';
            for (let i = 1; i <= periodsPerDay; i++) thead += `<th style="min-width:90px">P${i}</th>`;
            thead += '</tr></thead>';
            table.innerHTML += thead;

            let tbody = '<tbody>';
            workingDays.forEach(day => {
                tbody += `<tr><th class="day-cell">${day.slice(0,3)}</th>`;
                for (let i = 0; i < periodsPerDay; i++) {
                    let cellContent = '<span class="empty-cell">-</span>';
                    for (const className in timetable) {
                        const cellData = timetable[className][day][i];
                        if (!cellData) continue;
                        if (cellData.faculty === fName) {
                            const color = subjectColors[cellData.subject] || '#6366f1';
                            cellContent = `<div class="subject-cell" style="background-color:${color};"><strong>${cellData.subject}</strong><div class="text-xs opacity-80" style="font-size:0.65rem;">(${className})</div></div>`;
                            break;
                        }
                        if (cellData.type === "LAB" && Array.isArray(cellData.batches)) {
                            const batch = cellData.batches.find(b => b.faculty === fName);
                            if (batch) {
                                const color = subjectColors[batch.subject] || '#6366f1';
                                cellContent = `<div class="subject-cell" style="background-color:${color};"><strong>${batch.subject}</strong><div class="text-xs opacity-80" style="font-size:0.65rem;">(${className}-${batch.batch})</div></div>`;
                                break;
                            }
                        }
                    }
                    tbody += `<td>${cellContent}</td>`;
                }
                tbody += '</tr>';
            });
            tbody += '</tbody>';
            table.innerHTML += tbody;

            scrollWrapper.appendChild(table);
            containerDiv.appendChild(scrollWrapper);
            timetableContainer.appendChild(containerDiv);
        });
    }

    function generateColorPalette(subjectNames) {
        const colors = {};
        const hueStep = subjectNames.length > 0 ? 360 / subjectNames.length : 60;
        subjectNames.forEach((name, index) => { colors[name] = `hsl(${index * hueStep}, 70%, 55%)`; });
        return colors;
    }
